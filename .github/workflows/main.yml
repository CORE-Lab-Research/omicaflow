name: OmicaFlow CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-pipeline:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Snakemake
      run: |
        python -m pip install --upgrade pip
        pip install snakemake==7.32.4 pulp==2.7.0 pyyaml pandas jinja2

    - name: Setup Conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        activate-environment: omicaflow-r-base
        environment-file: envs/r_base.yml
        use-mamba: true

    - name: Prepare Mock Data
      run: |
        mkdir -p data/raw/test
        mkdir -p data/clinical/test
        cp data/test/SNV.maf data/raw/test/
        cp data/test/CNV.tsv data/raw/test/
        cp data/test/RNA_FPKM.tsv data/raw/test/
        cp data/test/Methylation_Beta.tsv data/raw/test/
        # Create dummy sample_map.tsv
        echo -e "sample\tpatient\ttype" > data/raw/test/sample_map.tsv
        echo -e "TCGA-00-0001\tTCGA-00-0001\tTumor" >> data/raw/test/sample_map.tsv
        echo -e "TCGA-00-0002\tTCGA-00-0002\tTumor" >> data/raw/test/sample_map.tsv
        echo -e "TCGA-00-0003\tTCGA-00-0003\tTumor" >> data/raw/test/sample_map.tsv
        # Create dummy clinical_data.tsv
        echo -e "sample\tOS\tOS_status" > data/clinical/test/clinical_data.tsv
        echo -e "TCGA-00-0001\t1000\t1" >> data/clinical/test/clinical_data.tsv
        echo -e "TCGA-00-0002\t500\t0" >> data/clinical/test/clinical_data.tsv
        echo -e "TCGA-00-0003\t1200\t1" >> data/clinical/test/clinical_data.tsv
        # Disable modules that require external data or are optional for smoke test
        sed -i 's/acquisition: { enabled: true }/acquisition: { enabled: false }/' config/base.yaml
        sed -i 's/survival: { enabled: true }/survival: { enabled: false }/' config/base.yaml
        # Note: survival is already false in base.yaml, but this ensures it stays false.

    - name: Run Snakemake Dry-run
      run: |
        snakemake -n --config project='{"cancer_type": "test"}'

    - name: Run Pipeline Smoke Test
      run: |
        snakemake --cores 2 --use-conda --config project='{"cancer_type": "test"}'
