name: OmicaFlow CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-pipeline:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Snakemake
      run: |
        python -m pip install --upgrade pip
        pip install snakemake==7.32.4 pulp==2.7.0 pyyaml pandas jinja2

    - name: Setup Conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        activate-environment: omicaflow-r-base
        environment-file: envs/r_base.yml
        channel-priority: strict

    - name: Prepare Mock Data
      run: |
        mkdir -p data/raw/test
        cp data/test/SNV.maf data/raw/test/
        cp data/test/CNV.tsv data/raw/test/
        cp data/test/RNA_FPKM.tsv data/raw/test/
        cp data/test/Methylation_Beta.tsv data/raw/test/
        # Create dummy sample_map.tsv
        echo -e "sample\tpatient\ttype" > data/raw/test/sample_map.tsv
        echo -e "TCGA-00-0001\tTCGA-00-0001\tTumor" >> data/raw/test/sample_map.tsv
        echo -e "TCGA-00-0002\tTCGA-00-0002\tTumor" >> data/raw/test/sample_map.tsv
        echo -e "TCGA-00-0003\tTCGA-00-0003\tTumor" >> data/raw/test/sample_map.tsv

    - name: Run Snakemake Dry-run
      run: |
        snakemake -n --config project:cancer_type="test"

    - name: Run Pipeline Smoke Test
      run: |
        snakemake --cores 2 --use-conda --config project:cancer_type="test" \
          modules:acquisition:enabled=false \
          modules:survival:enabled=false
